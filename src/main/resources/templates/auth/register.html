<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Register</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body><div class="container login-box"><div class="card">
<h1>Inventory Stock Management</h1>
<p class="footer-note">Create a new staff account</p>
<div class="alert error" th:if="${error}" th:text="${error}"></div>
<form th:action="@{/register}" method="post" id="registerForm" onsubmit="return validateRegister()">
<label>Full Name <input type="text" name="name" th:value="${name}" placeholder="e.g. Kamal Perera" required></label>
<label>Username <input type="text" name="username" id="reg-username" th:value="${username}" placeholder="e.g. kamal123" required minlength="3"></label>
<label>Email <input type="email" name="email" th:value="${email}" placeholder="e.g. kamal@example.com"></label>
<label>Phone <input type="tel" name="phone" id="reg-phone" th:value="${phone}" placeholder="e.g. 0711234567"></label>
<label>Password <input type="password" name="password" id="reg-password" placeholder="Min 6 characters" required minlength="6"></label>
<label>Confirm Password <input type="password" name="confirmPassword" id="reg-confirm" placeholder="Repeat password" required></label>
<div class="alert error" id="reg-error" style="display:none"></div>
<button class="btn" type="submit">Create Account</button>
</form>
<p class="footer-note" style="text-align:center;margin-top:12px">Already have an account? <a th:href="@{/login}">Login here</a></p>
</div></div>
<script>
function validateRegister() {
    var errBox = document.getElementById('reg-error');
    errBox.style.display = 'none';
    var username = document.getElementById('reg-username').value.trim();
    var phone    = document.getElementById('reg-phone').value.trim();
    var pwd      = document.getElementById('reg-password').value;
    var confirm  = document.getElementById('reg-confirm').value;

    if (username.length < 3) {
        errBox.textContent = 'Username must be at least 3 characters.';
        errBox.style.display = 'block'; return false;
    }
    if (!/^[a-zA-Z0-9_]+$/.test(username)) {
        errBox.textContent = 'Username may only contain letters, numbers and underscores.';
        errBox.style.display = 'block'; return false;
    }
    if (phone && !/^[0-9]{10}$/.test(phone)) {
        errBox.textContent = 'Phone number must be exactly 10 digits.';
        errBox.style.display = 'block'; return false;
    }
    if (pwd.length < 6) {
        errBox.textContent = 'Password must be at least 6 characters.';
        errBox.style.display = 'block'; return false;
    }
    if (pwd !== confirm) {
        errBox.textContent = 'Passwords do not match.';
        errBox.style.display = 'block'; return false;
    }
    return true;
}
</script>
</body>
</html>
