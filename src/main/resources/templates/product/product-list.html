<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title><link rel="stylesheet" th:href="@{/css/style.css}"><script th:src="@{/js/main.js}"></script>
</head>
<body>
<div class="navbar">
    <div><a class="brand" th:href="@{/dashboard}">Inventory Stock Management</a></div>
    <div>
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/products}">Products</a>
        <a th:href="@{/categories}">Categories</a>
        <a th:href="@{/suppliers}">Suppliers</a>
        <a th:href="@{/stock-in}">Stock In</a>
        <a th:href="@{/stock-out}">Stock Out</a>
        <a th:href="@{/users}">Users</a>
        <a th:href="@{/report}">Report</a>
        <a th:href="@{/logout}">Logout</a>
    </div>
</div>
<div class="container">
<div class="alert success" th:if="${success}" th:text="${success}"></div>
<div class="alert error" th:if="${param.denied}">Access denied. Admin role is required.</div>

<div class="card"><h1>Product Management</h1><div class="actions"><a class="btn" th:href="@{/products/add}">Add Product</a><form th:action="@{/products}" method="get" class="actions"><input type="text" name="q" th:value="${q}" placeholder="Search products"><button class="btn secondary">Search</button></form></div><p th:if="${!#lists.isEmpty(lowStockProducts)}"><span class="badge warn">Low stock items available</span></p>
<table><thead><tr><th>ID</th><th>SKU</th><th>Name</th><th>Price</th><th>Qty</th><th>Reorder</th><th>Category ID</th><th>Supplier ID</th><th>Actions</th></tr></thead><tbody><tr th:each="p:${products}"><td th:text="${p.id}"></td><td th:text="${p.sku}"></td><td th:text="${p.name}"></td><td th:text="${p.unitPrice}"></td><td><span th:class="${p.lowStock ? 'badge warn':'badge'}" th:text="${p.quantity}"></span></td><td th:text="${p.reorderLevel}"></td><td th:text="${p.categoryId}"></td><td th:text="${p.supplierId}"></td><td><a class="btn light" th:href="@{/products/edit/{id}(id=${p.id})}">Edit</a> <form class="inline-form" th:action="@{/products/delete/{id}(id=${p.id})}" method="post" onsubmit="return confirmDelete()"><button class="btn danger">Delete</button></form></td></tr></tbody></table></div>

</div></body></html>
